version: "2"
run:
  allow-parallel-runners: true
linters:
  enable:
    - copyloopvar
    - ginkgolinter
    - gocyclo
    - misspell
    - nakedret
    - unconvert
    - unparam
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - unparam
        path: "_test\\.go$"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

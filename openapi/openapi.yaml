          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /authz/admins/{arn}:
    delete:
      summary: Remove an admin
      description: Removes a principal from the admin list.
      operationId: removeAdmin
      tags:
        - Authorization
      parameters:
        - name: arn
          in: path
          required: true
          description: Admin's ARN (URL-encoded)
          schema:
            type: string
      responses:
        '204':
          description: Admin removed successfully
        '403':
          description: Forbidden - caller is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    ManagementClusterRequest:
      type: object
      description: Request body for creating a management cluster
      properties:
        name:
          type: string
          description: |
            Optional name for the management cluster.
            Must follow RFC 1123 format (like Kubernetes namespace).
            If not provided, defaults to the generated ID.
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 63
        labels:
          type: object
          description: Key-value labels for the management cluster
          additionalProperties:
            type: string
    ManagementCluster:
      type: object
      description: A management cluster (passthrough from Maestro consumer)
      required:
        - id
        - kind
        - href
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the management cluster
        kind:
          type: string
          description: Resource kind
          example: Consumer
        href:
          type: string
          description: API href reference
        name:
          type: string
          description: Unique name of the management cluster
        labels:
          type: object
          description: Key-value labels
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    ManagementClusterList:
      type: object
      description: Paginated list of management clusters
      required:
        - kind
        - page
        - size
        - total
        - items
      properties:
        kind:
          type: string
          description: Resource kind
          example: ConsumerList
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Number of items per page
        total:
          type: integer
          description: Total number of items
        items:
          type: array
          items:
            $ref: '#/components/schemas/ManagementCluster'
    ResourceBundle:
      type: object
      description: A resource bundle containing manifests for deployment
      required:
        - id
        - kind
        - href
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the resource bundle
        kind:
          type: string
          description: Resource kind
          example: ResourceBundle
        href:
          type: string
          description: API href reference
        name:
          type: string
          description: Name of the resource bundle
        consumer_name:
          type: string
          description: Name of the consumer this bundle is associated with
        version:
          type: integer
          description: Version number of the resource bundle
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        deleted_at:
          type: string
          format: date-time
          description: Deletion timestamp (if soft-deleted)
        metadata:
          type: object
          description: Additional metadata
          additionalProperties:
            type: string
        manifests:
          type: array
          description: Array of Kubernetes manifests
          items:
            type: object
        delete_option:
          type: object
          description: Deletion strategy for the resource bundle
        manifest_configs:
          type: array
          description: Configuration for manifests
          items:
            type: object
        status:
          type: object
          description: Status of the resource bundle
    ResourceBundleList:
      type: object
      description: Paginated list of resource bundles
      required:
        - kind
        - page
        - size
        - total
        - items
      properties:
        kind:
          type: string
          description: Resource kind
          example: ResourceBundleList
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Number of items per page
        total:
          type: integer
          description: Total number of items
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResourceBundle'
    WorkRequest:
      type: object
      description: Request body for creating manifestwork
      required:
        - cluster_id
        - data
      properties:
        cluster_id:
          type: string
          description: Unique identifier of the target cluster
        data:
          type: object
          description: |
            Payload data to be passed to Maestro gRPC for creating the manifestwork.
            This should contain the ManifestWork specification including manifests.
          additionalProperties: true
    Work:
      type: object
      description: A manifestwork resource created for a cluster
      required:
        - id
        - kind
        - href
        - cluster_id
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the manifestwork
        kind:
          type: string
          description: Resource kind
          example: ManifestWork
        href:
          type: string
          description: API href reference
        cluster_id:
          type: string
          description: Cluster ID this work is associated with
        name:
          type: string
          description: Name of the manifestwork resource
          example: rosa-work-cluster-123
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        status:
          type: object
          description: Status of the manifestwork
    Error:
      type: object
      description: Error response
      required:
        - code
        - reason
      properties:
        id:
          type: string
          description: Error ID
        kind:
          type: string
          description: Resource kind
          example: Error
        href:
          type: string
          description: API href reference
        code:
          type: string
          description: Error code
        reason:
          type: string
          description: Human-readable error message
        operation_id:
          type: string
          description: Request operation ID for tracing
    HealthStatus:
      type: object
      description: Health check response
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
          description: Health status
    # Authorization Schemas
    EnableAccountRequest:
      type: object
      description: Request body for enabling an account
      required:
        - accountId
      properties:
        accountId:
          type: string
          description: AWS account ID to enable
        privileged:
          type: boolean
          description: If true, account bypasses all authorization checks
          default: false
    Account:
      type: object
      description: An enabled account
      required:
        - accountId
        - privileged
        - createdAt
      properties:
        accountId:
          type: string
          description: AWS account ID
          pattern: '^\d{12}$'
        policyStoreId:
          type: string
          description: AVP policy store ID (null if privileged)
        privileged:
          type: boolean
          description: If true, bypasses all authorization
        createdAt:
          type: string
          format: date-time
          description: When the account was enabled
        createdBy:
          type: string
          description: ARN of who enabled the account
    AccountList:
      type: object
      description: List of accounts
      required:
        - kind
        - items
        - total
      properties:
        kind:
          type: string
          example: AccountList
        items:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        total:
          type: integer
          description: Total number of accounts
    CheckAuthorizationRequest:
      type: object
      description: Request body for checking authorization
      required:
        - principal
        - action
        - resource
      properties:
        principal:
          type: string
          description: Principal ARN making the request
        action:
          type: string
          description: Action being performed (e.g., rosa:CreateCluster)
        resource:
          type: string
          description: Resource ARN (e.g., arn:aws:rosa:us-west-2:123456789012:cluster/*)
        context:
          type: object
          description: Additional context for the authorization decision
          additionalProperties: true
        resourceTags:
          type: object
          description: Tags on the resource
          additionalProperties:
            type: string
    CheckAuthorizationResponse:
      type: object
      description: Authorization decision response
      required:
        - kind
        - decision
      properties:
        kind:
          type: string
          example: AuthorizationDecision
        decision:
          type: string
          description: Authorization decision
          enum: [ALLOW, DENY]
        reason:
          type: string
          description: Reason for the decision
    CreatePolicyRequest:
      type: object
      description: Request body for creating a policy
      required:
        - name
        - policy
      properties:
        name:
          type: string
          description: Policy name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Optional policy description
          maxLength: 1024
        policy:
          $ref: '#/components/schemas/V0Policy'
    UpdatePolicyRequest:
      type: object
      description: Request body for updating a policy
      properties:
        name:
          type: string
          description: Policy name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Optional policy description
          maxLength: 1024
        policy:
          $ref: '#/components/schemas/V0Policy'
    V0Policy:
      type: object
      description: IAM-like policy in v0 format
      required:
        - version
        - statements
      properties:
        version:
          type: string
          description: Policy format version
          enum: [v0]
        statements:
          type: array
          description: List of policy statements
          minItems: 1
          items:
            $ref: '#/components/schemas/PolicyStatement'
    PolicyStatement:
      type: object
      description: A single statement in a policy
      required:
        - effect
        - actions
        - resources
      properties:
        sid:
          type: string
          description: Optional statement ID
        effect:
          type: string
          description: Allow or Deny
          enum: [Allow, Deny]
        actions:
          type: array
          description: List of actions (e.g., rosa:CreateCluster)
          items:
            type: string
        resources:
          type: array
          description: List of resources (* for all)
          items:
            type: string
        conditions:
          type: object
          description: Optional conditions (operator -> key -> value)
          additionalProperties:
            $ref: '#/components/schemas/PolicyCondition'
    PolicyCondition:
      type: object
      description: Condition key-value pairs
      additionalProperties:
        oneOf:
          - type: string
          - type: boolean
          - type: number
          - type: array
            items:
              type: string
    Policy:
      type: object
      description: A policy template
      required:
        - id
        - kind
        - href
        - name
        - policy
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Policy ID
        kind:
          type: string
          description: Resource kind
          example: Policy
        href:
          type: string
          description: API href reference
        name:
          type: string
          description: Policy name
        description:
          type: string
          description: Policy description
        policy:
          $ref: '#/components/schemas/V0Policy'
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    PolicyList:
      type: object
      description: Paginated list of policies
      required:
        - kind
        - page
        - size
        - total
        - items
      properties:
        kind:
          type: string
          example: PolicyList
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Policy'
    CreateGroupRequest:
      type: object
      description: Request body for creating a group
      required:
        - name
      properties:
        name:
          type: string
          description: Group name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Optional group description
          maxLength: 1024
    Group:
      type: object
      description: A group of users
      required:
        - id
        - kind
        - href
        - name
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Group ID
        kind:
          type: string
          example: Group
        href:
          type: string
          description: API href reference
        name:
          type: string
          description: Group name
        description:
          type: string
          description: Group description
        memberCount:
          type: integer
          description: Number of members in the group
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
    GroupList:
      type: object
      description: Paginated list of groups
      required:
        - kind
        - page
        - size
        - total
        - items
      properties:
        kind:
          type: string
          example: GroupList
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Group'
    GroupMember:
      type: object
      description: A member of a group
      required:
        - memberArn
        - addedAt
      properties:
        memberArn:
          type: string
          description: Member's AWS ARN
        addedAt:
          type: string
          format: date-time
          description: When the member was added
    GroupMemberList:
      type: object
      description: Paginated list of group members
      required:
        - kind
        - page
        - size
        - total
        - items
      properties:
        kind:
          type: string
          example: GroupMemberList
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/GroupMember'
    UpdateGroupMembersRequest:
      type: object
      description: Request body for updating group members
      properties:
        add:
          type: array
          description: ARNs to add to the group
          items:
            type: string
        remove:
          type: array
          description: ARNs to remove from the group
          items:
            type: string
    CreateAttachmentRequest:
      type: object
      description: Request body for creating an attachment
      required:
        - policyId
        - targetType
        - targetId
      properties:
        policyId:
          type: string
          format: uuid
          description: Policy ID to attach
        targetType:
          type: string
          description: Type of target (user or group)
          enum: [user, group]
        targetId:
          type: string
          description: Target ID (ARN for user, groupId for group)
    Attachment:
      type: object
      description: A policy attachment to a user or group
      required:
        - id
        - kind
        - href
        - policyId
        - targetType
        - targetId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Attachment ID
        kind:
          type: string
          example: Attachment
        href:
          type: string
          description: API href reference
        policyId:
          type: string
          format: uuid
          description: Attached policy ID
        policyName:
          type: string
          description: Attached policy name
        targetType:
          type: string
          description: Target type
          enum: [user, group]
        targetId:
          type: string
          description: Target ID
        avpPolicyId:
          type: string
          description: Policy ID in Amazon Verified Permissions
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
    AttachmentList:
      type: object
      description: Paginated list of attachments
      required:
        - kind
        - page
        - size
        - total
        - items
      properties:
        kind:
          type: string
          example: AttachmentList
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
    AddAdminRequest:
      type: object
      description: Request body for adding an admin
      required:
        - principalArn
      properties:
        principalArn:
          type: string
          description: ARN of the principal to make admin
    Admin:
      type: object
      description: An admin for the account
      required:
        - principalArn
        - createdAt
      properties:
        principalArn:
          type: string
          description: Admin's AWS ARN
        createdAt:
          type: string
          format: date-time
          description: When the admin was added
        createdBy:
          type: string
          description: ARN of who added this admin
    AdminList:
      type: object
      description: Paginated list of admins
      required:
        - kind
        - page
        - size
        - total
        - items
      properties:
        kind:
          type: string
          example: AdminList
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Admin'
    # Cluster Schemas
    Cluster:
      description: |-
        Cluster represents a HyperFleet managed OpenShift cluster
        +kubebuilder:object:root=true
        +kubebuilder:subresource:status
        +kubebuilder:resource:scope=Namespaced
      type: object
      required:
        - spec
      properties:
        spec:
          $ref: '#/components/schemas/ClusterSpec'
        status:
          $ref: '#/components/schemas/ClusterStatus'
    ClusterCreateRequest:
      type: object
      description: |
        Request body for creating a cluster.

        The API automatically enriches the cluster spec with the following fields:
        - cloudUrl: Auto-populated from the first management cluster's cloudfront_url label
        - placement: Auto-populated from the first management cluster's name if not provided by the client
      required:
        - name
        - spec
      properties:
        name:
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          minLength: 3
          maxLength: 63
          description: DNS-compatible cluster name
        target_project_id:
          type: string
          description: Target project ID
        spec:
          allOf:
            - $ref: '#/components/schemas/ClusterSpec'
          description: Cluster specification (cloudUrl is server-populated and ignored on create)
    ClusterUpdateRequest:
      type: object
      description: Request body for updating a cluster
      required:
        - spec
      properties:
        spec:
          allOf:
            - $ref: '#/components/schemas/ClusterSpec'
          description: Cluster specification (mutable fields only)
    ClusterStatusInfo:
      type: object
      description: Kubernetes-like aggregated status for clusters
      properties:
        observedGeneration:
          type: integer
          format: int64
          description: Last generation processed by controllers
        conditions:
          type: array
          description: Status conditions
          items:
            $ref: '#/components/schemas/Condition'
        phase:
          type: string
          enum: [Pending, Progressing, Ready, Failed]
          description: High-level cluster phase
        message:
          type: string
          description: Human-readable status message
        reason:
          type: string
          description: Machine-readable reason code
        lastUpdateTime:
          type: string
          format: date-time
          description: When status was last calculated
    Condition:
      type: object
      description: Status condition
      properties:
        type:
          type: string
          description: Condition type
        status:
          type: string
          enum: [True, False, Unknown]
          description: Condition status
        lastTransitionTime:
          type: string
          format: date-time
          description: Last time the condition transitioned
        reason:
          type: string
          description: Machine-readable reason code
        message:
          type: string
          description: Human-readable message
    ClusterControllerStatus:
      type: object
      description: Controller-specific status for a cluster
      properties:
        cluster_id:
          type: string
          description: Cluster ID
        controller_name:
          type: string
          description: Name of the controller
        observed_generation:
          type: integer
          format: int64
          description: Last generation observed by this controller
        conditions:
          type: array
          description: Controller-specific conditions
          items:
            $ref: '#/components/schemas/Condition'
        metadata:
          type: object
          description: Controller-specific metadata
          additionalProperties: true
        data:
          type: object
          description: Controller-specific data
          additionalProperties: true
        last_updated:
          type: string
          format: date-time
          description: When this controller last updated
    ClusterStatusResponse:
      type: object
      description: Response for cluster status endpoint
      properties:
        cluster_id:
          type: string
          description: Cluster ID
        status:
          $ref: '#/components/schemas/ClusterStatusInfo'
        controller_statuses:
          type: array
          description: Individual controller status reports
          items:
            $ref: '#/components/schemas/ClusterControllerStatus'
    ClusterList:
      description: |-
        ClusterList contains a list of Clusters
        +kubebuilder:object:root=true
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            type: object
    # NodePool Schemas
    NodePool:
      description: |-
        NodePool represents a HyperFleet managed NodePool for a cluster
        +kubebuilder:object:root=true
        +kubebuilder:subresource:status
        +kubebuilder:resource:scope=Namespaced
      type: object
      required:
        - spec
      properties:
        spec:
          $ref: '#/components/schemas/NodePoolSpec'
        status:
          $ref: '#/components/schemas/NodePoolStatus'
    NodePoolCreateRequest:
      type: object
      description: Request body for creating a nodepool
      required:
        - cluster_id
        - name
        - spec
      properties:
        cluster_id:
          type: string
          description: Parent cluster ID
        name:
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          minLength: 3
          maxLength: 63
          description: DNS-compatible nodepool name
        spec:
          $ref: '#/components/schemas/NodePoolSpec'
    NodePoolUpdateRequest:
      type: object
      description: Request body for updating a nodepool
      required:
        - spec
      properties:
        spec:
          $ref: '#/components/schemas/NodePoolSpec'
    NodePoolSpec:
      type: object
      description: NodePool specification defining desired state
      additionalProperties: true
      properties:
        autoRepair:
          description: |-
            AutoRepair enables automatic repair of unhealthy nodes
            +hyperfleet:write-mode=mutable
          type: boolean
        clusterRef:
          description: ClusterReference identifies the parent cluster
          type: object
          required:
            - name
          properties:
            name:
              description: |-
                Name is the name of the Cluster resource
                +kubebuilder:validation:Required
              type: string
            namespace:
              description: |-
                Namespace is the namespace of the Cluster resource
                If empty, defaults to the same namespace as this NodePool
              type: string
        displayName:
          description: |-
            DisplayName is a human-readable name for the node pool
            +hyperfleet:write-mode=mutable
          type: string
        labels:
          description: |-
            Labels to apply to nodes in this pool
            +hyperfleet:write-mode=mutable
          type: object
          additionalProperties:
            type: string
        nodePool:
          description: |-
            NodePool contains the full HyperShift NodePool configuration
            All fields are generated from upstream and have safe defaults (hidden + service-set)
            +kubebuilder:validation:Required
          $ref: '#/components/schemas/NodePoolSpecPassthrough'
    NodePoolStatusInfo:
      type: object
      description: Kubernetes-like aggregated status for nodepools
      properties:
        observedGeneration:
          type: integer
          format: int64
          description: Last generation processed by controllers
        conditions:
          type: array
          description: Status conditions
          items:
            $ref: '#/components/schemas/Condition'
        phase:
          type: string
          enum: [Pending, Progressing, Ready, Failed]
          description: High-level nodepool phase
        message:
          type: string
          description: Human-readable status message
        reason:
          type: string
          description: Machine-readable reason code
        lastUpdateTime:
          type: string
          format: date-time
          description: When status was last calculated
    NodePoolControllerStatus:
      type: object
      description: Controller-specific status for a nodepool
      properties:
        nodepool_id:
          type: string
          description: NodePool ID
        controller_name:
          type: string
          description: Name of the controller
        observed_generation:
          type: integer
          format: int64
          description: Last generation observed by this controller
        conditions:
          type: array
          description: Controller-specific conditions
          items:
            $ref: '#/components/schemas/Condition'
        metadata:
          type: object
          description: Controller-specific metadata
          additionalProperties: true
        data:
          type: object
          description: Controller-specific data
          additionalProperties: true
        last_updated:
          type: string
          format: date-time
          description: When this controller last updated
    NodePoolStatusResponse:
      type: object
      description: Response for nodepool status endpoint
      properties:
        nodepool_id:
          type: string
          description: NodePool ID
        status:
          $ref: '#/components/schemas/NodePoolStatusInfo'
        controller_statuses:
          type: array
          description: Individual controller status reports
          items:
            $ref: '#/components/schemas/NodePoolControllerStatus'
    NodePoolList:
      description: |-
        NodePoolList contains a list of NodePools
        +kubebuilder:object:root=true
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            type: object
    APIServerNetworkConfiguration:
      type: object
    ClusterAuthentication:
      type: object
    ClusterConfiguration:
      description: |-
        ClusterConfiguration specifies configuration for individual OCP components in the cluster.
        This is a HyperFleet-owned mirror of hypershiftv1beta1.ClusterConfiguration that allows
        us to add granular markers to nested fields like kubelet config.
      type: object
      properties:
        kubelet:
          description: |-
            kubelet contains the configuration for kubelet on nodes.
            This is where we can add granular control over kubelet fields.
            +hyperfleet:write-mode=service-set
          $ref: '#/components/schemas/KubeletConfig'
        machineConfig:
          description: |-
            machineConfig contains the configuration for machine-level settings (kernel params, systemd, files).
            Granular markers allow safe subset exposure while hiding dangerous operations.
            +hyperfleet:write-mode=service-set
          $ref: '#/components/schemas/MachineConfigSpec'
    ClusterStatus:
      description: ClusterStatus defines the observed state of a Cluster
      type: object
      properties:
        apiEndpoint:
          description: APIEndpoint is the cluster API server endpoint
          type: string
        conditions:
          description: Conditions represent detailed cluster status
          type: array
          items:
            type: object
        consoleUrl:
          description: ConsoleURL is the web console URL
          type: string
        provisionStartTime:
          description: ProvisionStartTime is when provisioning began
          type: object
        readyTime:
          description: ReadyTime is when the cluster became ready
          type: object
        state:
          description: |-
            State represents the high-level cluster state
            +kubebuilder:validation:Enum=pending;provisioning;ready;degraded;deleting;failed
          type: string
        version:
          description: Version is the observed OpenShift version
          type: string
    FeatureGateConfiguration:
      type: object
    FileSpec:
      description: FileSpec represents a file to write to nodes.
      type: object
      required:
        - path
      properties:
        contents:
          description: contents is the file contents
          type: string
        group:
          description: group is the file owner group
          type: string
        mode:
          description: mode is the file permissions (e.g., 0644)
          type: integer
          format: int32
        overwrite:
          description: overwrite specifies whether to overwrite existing files
          type: boolean
        path:
          description: path is the absolute path where the file should be written
          type: string
        user:
          description: user is the file owner user
          type: string
    HostedClusterSpecPassthrough:
      description: HostedClusterSpecPassthrough mirrors HostedClusterSpec from upstream HyperShift
      type: object
    ImageConfiguration:
      type: object
    IngressConfiguration:
      type: object
    KubeletConfig:
      description: |-
        KubeletConfig specifies kubelet configuration.
        This is a HyperFleet-owned type that mirrors hypershiftv1beta1.KubeletConfig
        with granular markers for customer control.
      type: object
      properties:
        containerLogMaxFiles:
          description: |-
            containerLogMaxFiles is the maximum number of container log files.
            +hyperfleet:write-mode=mutable
          type: integer
          format: int32
        containerLogMaxSize:
          description: |-
            containerLogMaxSize is the maximum size of container log file before it is rotated.
            +hyperfleet:write-mode=mutable
          type: string
        imageGCHighThresholdPercent:
          description: |-
            imageGCHighThresholdPercent is the disk usage percent triggering image GC.
            +hyperfleet:write-mode=mutable
          type: integer
          format: int32
        imageGCLowThresholdPercent:
          description: |-
            imageGCLowThresholdPercent is the disk usage percent to gc to.
            +hyperfleet:write-mode=mutable
          type: integer
          format: int32
        imageMinimumGCAge:
          description: |-
            imageMinimumGCAge is the minimum age for an unused image before it is garbage collected.
            +hyperfleet:write-mode=mutable
          type: object
        kubeReserved:
          description: |-
            kubeReserved specifies resources reserved for Kubernetes system components.
            +hyperfleet:write-mode=immutable
          type: object
          additionalProperties:
            type: string
        maxPods:
          description: |-
            maxPods is the maximum number of pods per node.
            Customers can set this to optimize for high-density workloads.
            +hyperfleet:write-mode=mutable
          type: integer
          format: int32
        podPidsLimit:
          description: |-
            podPidsLimit is the maximum number of PIDs allowed per pod.
            Customers can increase this for applications that spawn many processes.
            +hyperfleet:write-mode=mutable
          type: integer
          format: int64
        registryBurst:
          description: |-
            registryBurst is the maximum size of bursty pulls, temporarily allows pulls to burst.
            +openshift:enable:FeatureGate=HyperFleetKubeletAdvanced
            +hyperfleet:write-mode=mutable
          type: integer
          format: int32
        registryPullQPS:
          description: |-
            registryPullQPS is the limit of registry pulls per second.
            +openshift:enable:FeatureGate=HyperFleetKubeletAdvanced
            +hyperfleet:write-mode=mutable
          type: integer
          format: int32
        serializeImagePulls:
          description: |-
            serializeImagePulls when enabled, tells kubelet to pull images one at a time.
            Tech preview feature for optimizing image pull performance.
            +openshift:enable:FeatureGate=HyperFleetKubeletAdvanced
            +hyperfleet:write-mode=mutable
          type: boolean
        streamingConnectionIdleTimeout:
          description: |-
            streamingConnectionIdleTimeout is the maximum time a streaming connection can be idle.
            +hyperfleet:write-mode=mutable
          type: object
        systemReserved:
          description: |-
            systemReserved specifies resources reserved for system daemons.
            Customers can set this on cluster creation but cannot change it later.
            +hyperfleet:write-mode=immutable
          type: object
          additionalProperties:
            type: string
    MachineConfigSpec:
      description: |-
        MachineConfigSpec specifies machine-level configuration.
        This controls kernel parameters, systemd units, and file writes.
        Most fields are platform-managed for security and stability.
      type: object
      properties:
        allowedKernelArguments:
          description: |-
            allowedKernelArguments specifies kernel parameters customers can request.
            This is a WHITELIST approach - customers can only request known-safe parameters.
            Platform validates against an allowlist and applies approved parameters.
            Tech Preview feature requiring explicit enablement.
            +openshift:enable:FeatureGate=HyperFleetMachineConfig
            +hyperfleet:write-mode=immutable
          type: array
          items:
            type: string
        fips:
          description: |-
            fips enables FIPS mode on nodes.
            Immutable - must be set at cluster creation, cannot be changed.
            +hyperfleet:write-mode=immutable
          type: boolean
    NetworkConfiguration:
      type: object
    NodePoolSpecPassthrough:
      description: NodePoolSpecPassthrough mirrors NodePoolSpec from upstream HyperShift
      type: object
    NodePoolStatus:
      description: NodePoolStatus defines the observed state of a NodePool
      type: object
      properties:
        availableReplicas:
          description: AvailableReplicas is the number of available nodes
          type: integer
          format: int32
        conditions:
          description: Conditions represent detailed node pool status
          type: array
          items:
            type: object
        readyReplicas:
          description: ReadyReplicas is the number of ready nodes
          type: integer
          format: int32
        replicas:
          description: Replicas is the current number of nodes
          type: integer
          format: int32
        state:
          description: |-
            State represents the high-level node pool state
            +kubebuilder:validation:Enum=pending;scaling;ready;degraded;deleting;failed
          type: string
    OAuthConfiguration:
      type: object
    ProxyConfiguration:
      type: object
    SchedulerConfiguration:
      type: object
    SystemdDropin:
      description: SystemdDropin represents a systemd drop-in configuration.
      type: object
      required:
        - name
      properties:
        contents:
          description: contents is the drop-in file contents
          type: string
        name:
          description: name is the name of the drop-in file
          type: string
    SystemdUnit:
      description: SystemdUnit represents a systemd unit configuration.
      type: object
      required:
        - name
      properties:
        contents:
          description: contents is the full systemd unit file contents
          type: string
        dropins:
          description: dropins are drop-in configurations for the unit
          type: array
          items:
            type: object
        enabled:
          description: enabled specifies whether the unit is enabled
          type: boolean
        name:
          description: name is the name of the systemd unit (e.g., "custom.service")
          type: string
    ClusterSpec:
      type: object
      description: Cluster specification defining desired state
      additionalProperties: true
      properties:
        cloudUrl:
          type: string
          readOnly: true
          description: CloudFront URL with cluster ID (auto-populated by server)
          example: https://doku78iof5s87.cloudfront.net/cluster-123
        deleteProtection:
          description: |-
            DeleteProtection prevents accidental deletion when enabled
            +hyperfleet:write-mode=mutable
          type: boolean
        displayName:
          description: |-
            DisplayName is a human-readable name for the cluster
            +hyperfleet:write-mode=mutable
            +kubebuilder:validation:MaxLength=256
          type: string
        expirationTimestamp:
          description: |-
            ExpirationTimestamp marks when this cluster should be automatically deleted
            +hyperfleet:write-mode=mutable
          type: object
        hostedCluster:
          description: |-
            HostedCluster contains the full HyperShift HostedCluster configuration
            All fields are generated from upstream and have safe defaults (hidden + service-set)
            until explicitly reviewed and exposed
          $ref: '#/components/schemas/HostedClusterSpecPassthrough'
        placement:
          type: string
          description: Management cluster name (auto-populated if not provided)
          example: management-cluster-us-east-1
        properties:
          description: |-
            Properties are arbitrary key-value pairs for customer metadata
            +hyperfleet:write-mode=mutable
          type: object
          additionalProperties:
            type: string
        tags:
          description: |-
            Tags are customer-defined labels for organizational purposes
            This is a TechPreview feature
            +hyperfleet:write-mode=mutable
            +openshift:enable:FeatureGate=HyperFleetAutoScaling
          type: object
          additionalProperties:
            type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

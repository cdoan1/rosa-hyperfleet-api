        Returns a list of attachments. Can be filtered by policy, target type,
        or target ID.
      operationId: listAttachments
      tags:
        - Authorization
      parameters:
        - name: policyId
          in: query
          description: Filter by policy ID
          schema:
            type: string
            format: uuid
        - name: targetType
          in: query
          description: Filter by target type (user or group)
          schema:
            type: string
            enum: [user, group]
        - name: targetId
          in: query
          description: Filter by target ID (ARN for user, groupId for group)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query

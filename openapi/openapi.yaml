openapi: 3.0.3
info:
  title: ROSA Regional Platform API
  description: Platform API for ROSA HCP regional cluster management
  version: 0.0.1
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: /api/v0
    description: API v0
paths:
  /management_clusters:
    post:
      summary: Create a new management cluster
      description: |
        Creates a new management cluster by registering a consumer in Maestro.
        Requires privileged access (admin AWS account).
      operationId: createManagementCluster
      tags:
        - ManagementClusters
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagementClusterRequest'
      responses:
        '201':
          description: Management cluster created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementCluster'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - account not privileged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List all management clusters
      description: |
        Returns a list of all management clusters (consumers in Maestro).
        Requires privileged access (admin AWS account).
      operationId: listManagementClusters
      tags:
        - ManagementClusters
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        '200':
          description: List of management clusters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementClusterList'
        '403':
          description: Forbidden - account not privileged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /management_clusters/{id}:
    get:
      summary: Get a management cluster by ID
      description: |
        Returns a specific management cluster by its ID.
        Requires privileged access (admin AWS account).
      operationId: getManagementCluster
      tags:
        - ManagementClusters
      parameters:
        - name: id
          in: path
          required: true
          description: Management cluster ID
          schema:
            type: string
      responses:
        '200':
          description: Management cluster details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementCluster'
        '403':
          description: Forbidden - account not privileged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Management cluster not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /resource_bundles:
    get:
      summary: List all resource bundles
      description: |
        Returns a paginated list of resource bundles.
        Supports filtering via search query and custom field selection.
      operationId: listResourceBundles
      tags:
        - ResourceBundles
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 0
            default: 100
        - name: search
          in: query
          description: SQL-like filter criteria on resource attributes
          schema:
            type: string
        - name: orderBy
          in: query
          description: SQL-like ordering (e.g., "name asc")
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated list of fields to return
          schema:
            type: string
        - name: X-Operation-ID
          in: header
          description: Optional operation ID for tracking
          schema:
            type: string
      responses:
        '200':
          description: List of resource bundles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceBundleList'
        '401':
          description: Invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - user lacks required permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /work:
    post:
      summary: Create manifestwork for a cluster
      description: |
        Creates manifestwork for the specified cluster identified by cluster_id.
        This endpoint creates the necessary work manifest for the target cluster.
      operationId: createWork
      tags:
        - Work
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkRequest'
      responses:
        '201':
          description: Manifestwork created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Work'
        '400':
          description: Bad request - invalid cluster_id or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - user lacks required permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Cluster not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Bad Gateway - Maestro error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  # Cluster Management Endpoints
  /clusters:
    get:
      summary: List user's clusters
      description: Retrieve clusters owned by the authenticated user
      operationId: listUserClusters
      tags:
        - Clusters
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum number of clusters to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of clusters to skip (pagination)
        - name: status
          in: query
          schema:
            type: string
            enum: [Pending, Progressing, Ready, Failed]
          description: Filter by cluster status
      responses:
        '200':
          description: List of user's clusters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create cluster
      description: |
        Create a new cluster for the authenticated user.

        The API automatically enriches the cluster spec with:
        - cloudUrl: Auto-populated from the management cluster's cloudfront_url label
        - placement: Auto-populated from the management cluster's name (if not provided by client)

        Possible error codes:
        - CLUSTERS-MGMT-CREATE-001: Invalid request body
        - CLUSTERS-MGMT-CREATE-002: Missing required fields (name or spec)
        - CLUSTERS-MGMT-CREATE-003: Failed to create cluster in hyperfleet
        - CLUSTERS-MGMT-CREATE-004: Failed to retrieve CloudFront URL
        - CLUSTERS-MGMT-CREATE-005: No management clusters found
        - CLUSTERS-MGMT-CREATE-006: CloudFront URL not configured
        - CLUSTERS-MGMT-CREATE-007: Management cluster name not available for placement
      operationId: createUserCluster
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterCreateRequest'
      responses:
        '201':
          description: Cluster created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /clusters/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Cluster ID
    get:
      summary: Get cluster details
      description: Retrieve cluster details (user must own the cluster)
      operationId: getUserCluster
      tags:
        - Clusters
      responses:
        '200':
          description: Cluster details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      summary: Update cluster
      description: Partially update cluster (user must own the cluster)
      operationId: patchUserCluster
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterUpdateRequest'
      responses:
        '200':
          description: Cluster updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Update cluster (deprecated)
      description: Update cluster (user must own the cluster). Deprecated - use PATCH instead for partial updates.
      operationId: updateUserCluster
      deprecated: true
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterUpdateRequest'
      responses:
        '200':
          description: Cluster updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete cluster
      description: Delete cluster (user must own the cluster)
      operationId: deleteUserCluster
      tags:
        - Clusters
      parameters:
        - name: force
          in: query
          schema:
            type: boolean
            default: false
          description: Force delete even if cluster has active resources
      responses:
        '202':
          description: Cluster deletion initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cluster_id:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /clusters/{id}/statuses:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Cluster ID
    get:
      summary: Get cluster statuses
      description: Retrieve cluster status and controller statuses (user must own the cluster)
      operationId: getUserClusterStatus
      tags:
        - Clusters
      responses:
        '200':
          description: Cluster status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  # NodePool Management Endpoints
  /nodepools:
    get:
      summary: List nodepools
      description: List nodepools for authenticated user (optionally filtered by cluster)
      operationId: listUserNodePools
      tags:
        - NodePools
      parameters:
        - name: clusterId
          in: query
          schema:
            type: string
          description: Filter by cluster ID (optional)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum number of nodepools to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of nodepools to skip (pagination)
      responses:
        '200':
          description: List of nodepools
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePoolList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create nodepool
      description: Create a new nodepool for the authenticated user
      operationId: createUserNodePool
      tags:
        - NodePools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodePoolCreateRequest'
      responses:
        '201':
          description: NodePool created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePool'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /nodepools/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: NodePool ID
    get:
      summary: Get nodepool details
      description: Retrieve nodepool details (user must own the cluster)
      operationId: getUserNodePool
      tags:
        - NodePools
      responses:
        '200':
          description: NodePool details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePool'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Update nodepool
      description: Update nodepool (user must own the cluster)
      operationId: updateUserNodePool
      tags:
        - NodePools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodePoolUpdateRequest'
      responses:
        '200':
          description: NodePool updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePool'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete nodepool
      description: Delete nodepool (user must own the cluster)
      operationId: deleteUserNodePool
      tags:
        - NodePools
      responses:
        '202':
          description: NodePool deletion initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  nodepool_id:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /nodepools/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: NodePool ID
    get:
      summary: Get nodepool status
      description: Retrieve nodepool status (user must own the cluster)
      operationId: getUserNodePoolStatus
      tags:
        - NodePools
      responses:
        '200':
          description: NodePool status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePoolStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /live:
    get:
      summary: Liveness probe
      description: Returns 200 if the service is alive
      operationId: liveness
      tags:
        - Health
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /ready:
    get:
      summary: Readiness probe
      description: Returns 200 if the service is ready to accept traffic
      operationId: readiness
      tags:
        - Health
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  # Authorization - Account Management
  /accounts:
    post:
      summary: Enable an account
      description: |
        Enables an AWS account for Cedar/AVP-based authorization.
        Creates a policy store in Amazon Verified Permissions.
        Requires privileged access.
      operationId: createAccount
      tags:
        - Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnableAccountRequest'
      responses:
        '201':
          description: Account enabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - caller is not privileged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Account already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List accounts
      description: |
        Returns a list of all enabled accounts.
        Requires privileged access.
      operationId: listAccounts
      tags:
        - Authorization
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountList'
        '403':
          description: Forbidden - caller is not privileged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /accounts/{id}:
    get:
      summary: Get an account
      description: |
        Returns details of a specific enabled account.
        Requires privileged access.
      operationId: getAccount
      tags:
        - Authorization
      parameters:
        - name: id
          in: path
          required: true
          description: AWS account ID
          schema:
            type: string
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '403':
          description: Forbidden - caller is not privileged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Disable an account
      description: |
        Disables an AWS account from authorization.
        Deletes the policy store and all associated policies, groups, and attachments.
        Requires privileged access.
      operationId: deleteAccount
      tags:
        - Authorization
      parameters:
        - name: id
          in: path
          required: true
          description: AWS account ID
          schema:
            type: string
      responses:
        '204':
          description: Account disabled successfully
        '403':
          description: Forbidden - caller is not privileged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  # Authorization - Check
  /authz/check:
    post:
      summary: Check authorization
      description: |
        Evaluates an authorization request against the account's policies
        and returns an ALLOW or DENY decision. Requires a provisioned account.
      operationId: checkAuthorization
      tags:
        - Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckAuthorizationRequest'
      responses:
        '200':
          description: Authorization decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAuthorizationResponse'
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - account not provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  # Authorization - Policy Management
  /authz/policies:
    post:
      summary: Create a policy
      description: |
        Creates a new policy template. Policies define permissions using an IAM-like
        format with statements containing effects, actions, resources, and conditions.
        Policies must be attached to users or groups to take effect.
      operationId: createPolicy
      tags:
        - Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
      responses:
        '201':
          description: Policy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: Bad request - invalid policy format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - account not provisioned or caller not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: List policies
      description: Returns a list of all policies for the account.
      operationId: listPolicies
      tags:
        - Authorization
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        '200':
          description: List of policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyList'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /authz/policies/{id}:
    get:
      summary: Get a policy
      description: Returns a specific policy by ID.
      operationId: getPolicy
      tags:
        - Authorization
      parameters:
        - name: id
          in: path
          required: true
          description: Policy ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:

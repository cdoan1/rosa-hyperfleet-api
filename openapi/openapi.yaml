        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - caller is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Admin already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':

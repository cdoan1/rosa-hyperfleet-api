    "components": {
      "schemas": {
        "Cluster": {
          "type": "object",
          "description": "A managed ROSA HCP cluster with envelope pattern",
          "required": [
            "kind",
            "apiVersion",
            "id",
            "name",
            "created_by",
            "generation",
            "resource_version",
            "spec",
            "created_at",
            "updated_at"
          ],
          "properties": {
            "kind": {
              "type": "string",
              "enum": [
                "Cluster"
              ],
              "description": "Resource kind"
            },
            "apiVersion": {
              "type": "string",
              "enum": [
                "v1"
              ],
              "description": "API version"
            },
            "id": {
              "type": "string",
              "description": "Unique identifier for the cluster"
            },
            "name": {
              "type": "string",
              "description": "Cluster name"
            },
            "created_by": {
              "type": "string",
              "description": "Email of the user who created this cluster"
            },
            "generation": {
              "type": "integer",
              "format": "int64",
              "description": "Generation number for optimistic concurrency control"
            },
            "resource_version": {
              "type": "string",
              "description": "Resource version for optimistic concurrency control"
            },
            "metadata": {
              "$ref": "#/components/schemas/ResourceMetadata"
            },
            "spec": {
              "$ref": "#/components/schemas/ClusterSpec"
            },
            "status": {
              "$ref": "#/components/schemas/ClusterStatus"
            },
            "created_at": {
              "type": "string",
              "format": "date-time",
              "description": "Creation timestamp"
            },
            "updated_at": {
              "type": "string",
              "format": "date-time",
              "description": "Last update timestamp"
            }
          }
        },
        "ClusterRequest": {
          "type": "object",
          "required": [
            "metadata",
            "spec"
          ],
          "properties": {
            "metadata": {
              "type": "object",
              "required": [
                "name"
              ],
              "properties": {
                "name": {
                  "type": "string",
                  "pattern": "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$",
                  "minLength": 3,
                  "maxLength": 53,
                  "description": "Cluster name"
                },
                "labels": {
                  "type": "object",
                  "additionalProperties": {
                    "type": "string"
                  }
                }
              }
            },
            "spec": {
              "$ref": "#/components/schemas/ClusterSpec"
            }
          }
        },
        "ClusterPatch": {
          "type": "object",
          "properties": {
            "metadata": {
              "type": "object",
              "properties": {
                "labels": {
                  "type": "object",
                  "additionalProperties": {
                    "type": "string"
                  }
                }
              }
            },
            "spec": {
              "type": "object",
              "description": "Partial cluster spec updates",
              "additionalProperties": true
            }
          }
        },
        "ClusterSpec": {
          "type": "object",
          "description": "Cluster specification with envelope fields and HostedCluster passthrough",
          "properties": {
            "delete_protection": {
              "type": "object",
              "properties": {
                "enabled": {
                  "type": "boolean",
                  "default": false
                }
              }
            },
            "expiration_timestamp": {
              "type": "string",
              "format": "date-time",
              "description": "Auto-delete after this time"
            },
            "properties": {
              "type": "object",
              "additionalProperties": {
                "type": "string"
              },
              "description": "Arbitrary key-value metadata"
